name: WHALE CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci --prefix frontend
    
    - name: Run ESLint
      run: npm run lint --prefix frontend
    
    - name: Run TypeScript check
      run: npm run type-check --prefix frontend
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer
    
    - name: Install PHP dependencies
      run: composer install --no-interaction --prefer-dist --working-dir=backend/laravel
    
    - name: Run PHP CodeSniffer
      run: ./vendor/bin/phpcs backend/laravel --standard=PSR12
      working-directory: backend/laravel
      continue-on-error: true
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install Python dependencies
      run: pip install -r backend/fastapi/requirements.txt
    
    - name: Run Pylint
      run: pylint backend/fastapi --disable=all --enable=E,F
      continue-on-error: true

  tests:
    runs-on: ubuntu-latest
    needs: code-quality
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: whale_test
          POSTGRES_USER: whale_user
          POSTGRES_PASSWORD: whale_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install frontend dependencies
      run: npm ci --prefix frontend
    
    - name: Run frontend tests
      run: npm run test --prefix frontend
      env:
        CI: true
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer
    
    - name: Install PHP dependencies
      run: composer install --no-interaction --prefer-dist --working-dir=backend/laravel
    
    - name: Create Laravel .env
      run: |
        cp .env.testing .env
        php artisan key:generate
      working-directory: backend/laravel
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_DATABASE: whale_test
        DB_USERNAME: whale_user
        DB_PASSWORD: whale_password
        REDIS_HOST: localhost
    
    - name: Run Laravel migrations
      run: php artisan migrate
      working-directory: backend/laravel
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_DATABASE: whale_test
        DB_USERNAME: whale_user
        DB_PASSWORD: whale_password
    
    - name: Run Laravel tests
      run: php artisan test
      working-directory: backend/laravel
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_DATABASE: whale_test
        DB_USERNAME: whale_user
        DB_PASSWORD: whale_password
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install Python dependencies
      run: pip install -r backend/fastapi/requirements.txt
    
    - name: Run FastAPI tests
      run: pytest backend/fastapi/tests
      env:
        DATABASE_URL: postgresql://whale_user:whale_password@localhost:5432/whale_test

  security-scan:
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Trivy vulnerability scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  build:
    runs-on: ubuntu-latest
    needs: [ tests, security-scan ]
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Render
      run: |
        curl -X POST https://api.render.com/deploy/srv/${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}
    
    - name: Notify Slack
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "WHALE deployment completed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "✅ WHALE has been successfully deployed to production\n*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}