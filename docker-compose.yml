version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: whale-postgres
    environment:
      POSTGRES_DB: whale_db
      POSTGRES_USER: whale_user
      POSTGRES_PASSWORD: whale_password_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whale_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whale-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: whale-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whale-network

  # Laravel PHP-FPM Backend
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
      target: laravel
    container_name: whale-laravel
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=whale_db
      - DB_USERNAME=whale_user
      - DB_PASSWORD=whale_password_dev
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - LOG_CHANNEL=stack
      - SANCTUM_STATEFUL_DOMAINS=localhost:3000
    ports:
      - "9000:9000"
    volumes:
      - ./backend/laravel:/app/backend/laravel
      - ./backend/laravel/storage:/app/backend/laravel/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - whale-network
    command: >
      sh -c "
        php artisan migrate --force &&
        php artisan key:generate &&
        php-fpm
      "

  # FastAPI Data Analysis Service
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
      target: fastapi
    container_name: whale-fastapi
    environment:
      - DATABASE_URL=postgresql://whale_user:whale_password_dev@postgres:5432/whale_db
      - PYTHONUNBUFFERED=1
      - ENV=development
    ports:
      - "8001:8001"
    volumes:
      - ./backend/fastapi:/app/backend/fastapi
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - whale-network
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  # React Frontend Development
  frontend:
    image: node:18-alpine
    container_name: whale-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:80/api
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    working_dir: /app/frontend
    networks:
      - whale-network
    command: >
      sh -c "
        npm install &&
        npm start
      "

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: whale-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/build:/app/frontend/build:ro
    depends_on:
      - laravel
      - fastapi
      - frontend
    networks:
      - whale-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgAdmin (Database Management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: whale-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@whale.local
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - whale-network

  # Mailhog (Email Testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: whale-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - whale-network

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  whale-network:
    driver: bridge